name: "Daily Signal — Daily Scan"

on:
  schedule:
    - cron: "30 1 * * 1-5"    # 08:30 WIB pre-market
    - cron: "30 10 * * 1-5"   # 17:30 WIB post-market scan

  workflow_dispatch:
    inputs:
      mode:
        description: "Mode yang dijalankan"
        required: true
        default: "full_scan"
        type: choice
        options:
          - full_scan
          - pre_market
          - health_check

jobs:

  # ══════════════════════════════════════════════════════════════
  # JOB 1 — PRE-MARKET (08:30 WIB)
  # ══════════════════════════════════════════════════════════════
  pre_market:
    name: "🌅 Pre-Market Alert (08:30 WIB)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.schedule == '30 1 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pre_market')

    # ← env di level JOB, bukan workflow — ini yang benar
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      APP_ENV: production
      LOG_LEVEL: INFO

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: "📦 Install"
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: "📁 Logs"
        run: mkdir -p logs
      - name: "🌅 Pre-Market Alert"
        run: python -m src.runner pre_market
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════
  # JOB 2 — FULL DAILY SCAN (17:30 WIB)
  # ══════════════════════════════════════════════════════════════
  daily_scan:
    name: "📊 Full Daily Scan (17:30 WIB)"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event.schedule == '30 10 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full_scan')

    # ← env di level JOB
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      APP_ENV: production
      LOG_LEVEL: INFO

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Install Dependencies"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import yfinance, pandas, numpy, supabase, requests; print('✅ OK')"

      - name: "📁 Logs Directory"
        run: mkdir -p logs

      - name: "🏥 Health Check"
        run: python -m src.runner health_check

      - name: "📊 Full Daily Scan"
        run: python -m src.runner daily_scan

      - name: "💼 Update Portfolio"
        run: python -m src.runner update_portfolio
        continue-on-error: true

      - name: "📸 Portfolio Snapshot"
        run: python -m src.runner portfolio_snapshot
        continue-on-error: true

      - name: "📋 Upload Logs"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════
  # JOB 3 — HEALTH CHECK MANUAL
  # ══════════════════════════════════════════════════════════════
  health_check:
    name: "🏥 Health Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'health_check'

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      APP_ENV: production
      LOG_LEVEL: INFO

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: mkdir -p logs
      - name: "🏥 Health Check"
        run: python -m src.runner health_check
